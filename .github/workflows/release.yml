name: Windows Release

on:
  push:
    tags:
      - 'v*'

jobs:
  windows-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        shell: bash
        run: ./gradlew clean build

      - name: Normalize version for jpackage
        id: version
        shell: bash
        run: |
          # Strip leading 'v' (e.g. v1.2.3 -> 1.2.3)
          RAW="${GITHUB_REF_NAME#v}"
          # jpackage on Windows requires at least a 3-part version (x.y.z)
          DOTS="${RAW//[^.]}"
          while [ "${#DOTS}" -lt 2 ]; do
            RAW="${RAW}.0"
            DOTS="${RAW//[^.]}"
          done
          echo "VERSION=$RAW" >> "$GITHUB_OUTPUT"
          echo "Normalized version: $RAW"

      - name: Find built JAR
        id: jar
        shell: bash
        run: |
          JAR_PATH=(build/libs/*.jar)
          JAR_NAME=$(basename "${JAR_PATH[0]}")
          echo "JAR_NAME=$JAR_NAME" >> "$GITHUB_OUTPUT"
          echo "Found JAR: ${JAR_PATH[0]}"

      - name: Create output directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Build MSI installer with jpackage
        id: msi
        shell: pwsh
        run: |
          jpackage `
            --input build/libs `
            --main-jar "${{ steps.jar.outputs.JAR_NAME }}" `
            --main-class pong.PongApp `
            --name PongApp `
            --app-version "${{ steps.version.outputs.VERSION }}" `
            --type msi `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser `
            --dest dist
        continue-on-error: true

      - name: Build EXE installer with jpackage (fallback)
        id: exe
        if: steps.msi.outcome == 'failure'
        shell: pwsh
        run: |
          jpackage `
            --input build/libs `
            --main-jar "${{ steps.jar.outputs.JAR_NAME }}" `
            --main-class pong.PongApp `
            --name PongApp `
            --app-version "${{ steps.version.outputs.VERSION }}" `
            --type exe `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser `
            --dest dist
        continue-on-error: true

      - name: Build app-image ZIP (last-resort fallback)
        id: appimage
        if: steps.msi.outcome == 'failure' && steps.exe.outcome == 'failure'
        shell: pwsh
        run: |
          jpackage `
            --input build/libs `
            --main-jar "${{ steps.jar.outputs.JAR_NAME }}" `
            --main-class pong.PongApp `
            --name PongApp `
            --app-version "${{ steps.version.outputs.VERSION }}" `
            --type app-image `
            --dest dist
          Compress-Archive `
            -Path dist/PongApp `
            -DestinationPath "dist/PongApp-${{ github.ref_name }}-windows.zip"

      - name: Locate and rename release artifact
        id: artifact
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path dist |
            Where-Object { $_.Extension -in '.msi', '.exe', '.zip' }
          if (-not $files) {
            Write-Error "No release artifact found in dist/"
            exit 1
          }
          $src = $files | Select-Object -First 1
          $ext = $src.Extension
          $dest = "dist/PongApp-${{ github.ref_name }}-windows$ext"
          Move-Item -Path $src.FullName -Destination $dest
          Write-Host "Release artifact: $dest"
          "ARTIFACT=$dest" >> $env:GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PongApp ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.ARTIFACT }}
